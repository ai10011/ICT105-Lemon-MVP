<!DOCTYPE html>
<html lang="en" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Blue Hydroflask - Lemon Campus Security</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script src="js/tailwind.config.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="Shared/components.js"></script>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col pt-[80px]">
    <div id="header-placeholder"></div>
    <main class="flex-grow w-full max-w-max-width mx-auto px-margin-mobile md:px-margin-desktop py-lg md:py-xxl">
        <div class="mb-md md:mb-lg">
            <a class="inline-flex items-center text-on-surface-variant hover:text-primary transition-colors font-body-bold text-sm sm:text-body-bold group"
                href="records.html">
                <span
                    class="material-symbols-outlined mr-2 group-hover:-translate-x-1 transition-transform text-lg sm:text-xl">arrow_back</span>
                Back to Browse
            </a>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-lg lg:gap-xxl">
            <div class="lg:col-span-7 flex flex-col gap-md">
                <div id="main-image-container"
                    class="w-full aspect-[4/3] rounded-xl overflow-hidden border border-outline-variant shadow-[0_4px_6px_-1px_rgba(45,49,52,0.05)] bg-surface-container-lowest relative group">
                    <div
                        class="w-full h-full flex items-center justify-center bg-surface-variant border-2 border-dashed border-outline-variant text-on-surface-variant transition-transform duration-500 group-hover:scale-105">
                        <span class="material-symbols-outlined text-4xl opacity-50">image</span>
                    </div>
                    <div id="badge-status"
                        class="absolute top-4 left-4 bg-error text-on-error px-3 py-1 rounded-full font-label-caps text-label-caps shadow-sm">
                        LOST ITEM
                    </div>
                </div>
            </div>
            <div class="lg:col-span-5 flex flex-col">
                <div
                    class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-[0_4px_6px_-1px_rgba(45,49,52,0.05)] p-md sm:p-xl mb-lg">
                    <h1 id="item-title" class="font-display-lg text-2xl sm:text-3xl lg:text-display-lg mb-xs text-on-surface">Loading item...
                    </h1>
                    <p id="item-date"
                        class="font-body-base text-sm sm:text-body-base text-on-surface-variant mb-xs flex items-center">
                        <span class="material-symbols-outlined text-[18px] mr-1">schedule</span>
                        Reported recently
                    </p>
                    <p id="item-reporter"
                        class="font-body-base text-body-base text-on-surface-variant mb-lg flex items-center">
                        <span class="material-symbols-outlined text-[18px] mr-1">person</span>
                        Reported by: <span id="item-reporter-name" class="font-body-bold text-on-surface ml-1">Campus
                            User</span>
                    </p>
                    <div id="item-tags" class="flex flex-wrap gap-sm mb-xl">
                        <span
                            class="px-3 py-1 bg-primary-container/20 text-on-primary-container rounded-full font-label-caps text-label-caps border border-primary-container/30">General</span>
                    </div>
                    <div class="mb-xl">
                        <h2
                            class="font-subheading-sm text-subheading-sm mb-sm text-on-surface border-b border-outline-variant pb-2">
                            Description</h2>
                        <p id="item-description"
                            class="font-body-base text-body-base text-on-surface-variant leading-relaxed">
                            No description provided.
                        </p>
                    </div>
                    <div class="mb-xl">
                        <h2
                            class="font-subheading-sm text-subheading-sm mb-sm text-on-surface border-b border-outline-variant pb-2 flex items-center">
                            <span class="material-symbols-outlined mr-2">location_on</span>
                            Location Details
                        </h2>
                        <div class="flex items-start mt-4">
                            <div
                                class="w-full h-32 rounded-lg bg-surface-container overflow-hidden relative border border-outline-variant">
                                <div
                                    class="absolute inset-0 flex items-center justify-center text-on-surface-variant flex-col p-4 text-center">
                                    <span class="material-symbols-outlined text-display-lg mb-1 text-outline">map</span>
                                    <span id="location-text"
                                        class="font-label-caps text-label-caps text-on-surface">Main Campus</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="action-buttons-container" class="flex flex-col gap-md mt-auto">
                        
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>

    <script src="js/detail.js"></script>
</body>

</html>
