<!DOCTYPE html>
<html lang="en" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Browse Items - Lemon</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/tailwind.config.js"></script>
    <script src="Shared/components.js"></script>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col pt-[80px]">
    <div id="header-placeholder"></div>
    <main class="flex-grow w-full max-w-max-width mx-auto px-margin-desktop py-xl flex flex-col md:flex-row gap-gutter">
        <aside class="w-full md:w-64 flex-shrink-0 space-y-lg">
            <div class="bg-surface-container-lowest p-lg rounded-xl border border-outline-variant shadow-sm space-y-md">
                <h2 class="font-subheading-sm text-subheading-sm text-on-surface mb-md">Filters</h2>
                <div class="space-y-md">
                    <div>
                        <h3 class="font-body-bold text-body-bold text-on-surface-variant mb-sm">Status</h3>
                        <div class="flex flex-col gap-sm">
                            <label class="flex items-center gap-sm">
                                <input id="filter-lost" checked=""
                                    class="rounded border-outline-variant text-primary focus:ring-primary h-5 w-5"
                                    type="checkbox">
                                <span class="">Lost</span>
                            </label>
                            <label class="flex items-center gap-sm">
                                <input id="filter-found" checked=""
                                    class="rounded border-outline-variant text-primary focus:ring-primary h-5 w-5"
                                    type="checkbox">
                                <span class="">Found</span>
                            </label>
                        </div>
                    </div>
                    <hr class="border-outline-variant">
                    <div>
                        <h3 class="font-body-bold text-body-bold text-on-surface-variant mb-sm">Item Type</h3>
                        <select id="filter-category"
                            class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg px-md focus:border-primary focus:ring-1 focus:ring-primary">
                            <option value="">All Types</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Stationery">Stationery</option>
                            <option value="Personal">Personal</option>
                            <option value="Clothing">Clothing</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <hr class="border-outline-variant">
                    <div>
                        <h3 class="font-body-bold text-body-bold text-on-surface-variant mb-sm">Location</h3>
                        <select id="filter-location"
                            class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg px-md focus:border-primary focus:ring-1 focus:ring-primary">
                            <option value="">All Locations</option>
                            <option value="Main Library">Main Library</option>
                            <option value="Student Union">Student Union</option>
                            <option value="Science Building">Science Building</option>
                            <option value="Engineering Block">Engineering Block</option>
                            <option value="Cafeteria">Cafeteria</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <button id="filter-reset"
                        class="w-full h-12 border border-outline text-on-surface font-body-bold rounded-lg mt-md hover:bg-surface-container-low transition-colors">
                        Reset Filters
                    </button>
                </div>
            </div>
        </aside>
        <div class="flex-grow flex flex-col gap-lg">
            <div
                class="flex items-center bg-surface-container-lowest border border-outline-variant rounded-full px-md h-12 shadow-sm">
                <span class="material-symbols-outlined text-on-surface-variant"
                    style="font-variation-settings: 'FILL' 0;">search</span>
                <input id="filter-search"
                    class="bg-transparent border-none focus:ring-0 text-body-base w-full ml-sm outline-none"
                    placeholder="Search items..." type="text">
            </div>
            <div class="flex justify-between items-center mb-sm">
                <h1 class="font-headline-md text-headline-md text-on-surface">Browse Items</h1>
                <span id="results-counter" class="text-on-surface-variant font-body-base">Showing 0 results</span>
            </div>
            <div id="records-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-lg">
                
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>

    <script src="js/records.js"></script>
</body>

</html>
